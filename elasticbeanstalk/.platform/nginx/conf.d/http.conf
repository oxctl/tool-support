# Non encrypted server
server {
  listen 80;

  gzip on;
  gzip_comp_level 4;
  gzip_types text/html text/plain text/css application/json application/x-javascript application/xml application/xml+rss text/javascript;

  # Include the Elastic Beanstalk generated locations
  include conf.d/elasticbeanstalk/*.conf;

  access_log    /var/log/nginx/access.log main;

  location / {
    set $redirect 0;
    if ($http_x_forwarded_proto != "https") {
      set $redirect 1;
    }
    # We want the health checker not to get redirected
    if ($http_user_agent ~* "ELB-HealthChecker") {
      set $redirect 0;
    }
    if ($redirect = 1) {
      return 301 https://$host$request_uri;
    }

    proxy_pass            http://docker;
    proxy_http_version    1.1;

    proxy_set_header    Connection            $connection_upgrade;
    proxy_set_header    Upgrade                $http_upgrade;
    proxy_set_header    Host                $host;
    proxy_set_header    X-Real-IP            $remote_addr;
    proxy_set_header    X-Forwarded-For        $proxy_add_x_forwarded_for;
  }
}
