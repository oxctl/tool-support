# This is to deploy a tagged version to production.

name: Production Deployment
run-name: "Deploy ${{ inputs.tag }} to Production"

env:
  AWS_REGION: "eu-west-1"
  # If AWS account/project changes this should too
  DOCKER_REPO: 211318693510.dkr.ecr.eu-west-1.amazonaws.com/ctl/canvas-proxy
  EB_APPLICATION: tool-support
  EB_ENVIRONMENT: tool-support-prod-env

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to deploy'
        required: true

jobs:
  deploy-prod:
    runs-on: ubuntu-20.04
    timeout-minutes: 20
    concurrency: prod
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.PROD_AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.PROD_AWS_SECRET_ACCESS_KEY }}
      TAG: ${{ github.event.inputs.tag }}
    steps:
      - name: Start deployment
        uses: bobheadxi/deployments@v1.4.0
        id: deployment
        with:
          step: start
          env: prod
          desc: Production deploy of ${{ env.TAG }}
          ref: refs/tags/${{ env.TAG }}
      - name: Deploy to EB
        uses: einaregilsson/beanstalk-deploy@v21
        timeout-minutes: 15
        with:
          aws_access_key: ${{ secrets.PROD_AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.PROD_AWS_SECRET_ACCESS_KEY }}
          application_name: ${{ env.EB_APPLICATION }}
          environment_name: ${{ env.EB_ENVIRONMENT }}
          version_label: github.${{ env.TAG }}
          region: ${{ env.AWS_REGION }}
      - name: Save version in secrets manager
        run: aws secretsmanager update-secret --secret-id ${{ vars.VERSION_SECRET }} --secret-string github.${{ env.TAG }}
      - name: Update deployment status
        uses: bobheadxi/deployments@v1.4.0
        if: always()
        with:
          step: finish
          env: ${{ steps.deployment.outputs.env }}
          status: ${{ job.status }}
          deployment_id: ${{ steps.deployment.outputs.deployment_id }}
