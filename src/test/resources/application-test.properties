spring.security.oauth2.client.registration.test.client-id=1234
spring.security.oauth2.client.registration.test.client-secret=not-used
# If it's a unknown grant type the token isn't required.
spring.security.oauth2.client.registration.test.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.test.scope=openid
# This is different because we're going to just the frontend
spring.security.oauth2.client.registration.test.redirect-uri={baseUrl}/lti/login
spring.security.oauth2.client.registration.test.provider=canvas

spring.security.oauth2.client.provider.canvas.authorization-uri=https://canvas.instructure.com/api/lti/authorize_redirect
spring.security.oauth2.client.provider.canvas.token-uri=https://canvas.instructure.com/login/oauth2/token
spring.security.oauth2.client.provider.canvas.jwk-set-uri=https://canvas.instructure.com/api/lti/security/jwks
spring.security.oauth2.client.provider.canvas.user-name-attribute=sub

proxy.mapping.1234=test